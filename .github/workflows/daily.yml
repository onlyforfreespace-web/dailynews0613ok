name: Daily News Agent

on:
  schedule:
    - cron: '35 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai feedparser
          # 验证安装是否成功，如果安装失败，这里会报错，而不是在运行 main_deep.py 时才报错
          python -c "from google import genai; print('安装成功')"
          
      - name: Check available models
        run: python check_models.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          
      - name: Run Articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main_deep.py
          sleep 45  # 强制等待10秒，错开两次调用
          python main_odd.py
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 在 push 前先 pull 一下，确保本地版本是最新的
          git pull origin main --rebase
          git add *.md
          # 如果没有新的 md 文件生成，commit 这一步会报错，所以加上 || echo 
          git commit -m "Auto-generate articles" || echo "No changes"
          git push origin main
          #git add *.md
          #git commit -m "Auto-generate articles" || echo "No changes to commit"
          #git push
# 新增的发送邮件任务
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com # 如果你用的是 163 邮箱，请改为 smtp.163.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 🐱 猫笔刀今日更新
          body: 文章已自动生成并保存至仓库，详情请查看最新提交。
          to: ${{ secrets.EMAIL_USER }} # 发给自己
          from: GitHub Actions <${{ secrets.EMAIL_USER }}>
          # 使用下面这行代码来精确指定当天的文件
          attachments: |
            article_deep_$(date +'%Y-%m-%d')-0613.md,
            article_odd_$(date +'%Y-%m-%d')-0613.md

